<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassChat V7</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{--bg:#0b0f17;--panel:#111827;--border:rgba(255,255,255,0.08);
--blue:#4f8cff;--violet:#7a5cff;--neon:#9b5cff;
--text:#fff;--muted:#9aa4b2}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:radial-gradient(circle at top,#141a2e,#05070d);color:var(--text);height:100vh}

.app{display:flex;flex-direction:column;height:100vh}
.top{height:55px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border)}
.messages{flex:1;overflow:auto;padding:12px}

.msg{display:flex;padding:10px;border-radius:10px;transition:0.2s;position:relative}
.msg:hover{background:rgba(255,255,255,0.04)}
.avatar{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--violet));display:flex;align-items:center;justify-content:center;margin-right:12px;font-weight:700}
.name{font-weight:700}
.owner{margin-left:8px;font-size:10px;padding:2px 6px;border-radius:6px;background:linear-gradient(135deg,#ff00cc,#3333ff);box-shadow:0 0 8px #9b5cff}
.text{color:var(--muted);margin-top:3px}
.msg img{margin-top:6px;border-radius:8px;max-width:200px}

.actions{position:absolute;right:10px;top:5px;display:none}
.msg:hover .actions{display:flex;gap:5px}
.actions button{background:none;border:none;color:var(--muted);cursor:pointer}
.actions button:hover{color:white}

.reactions{display:flex;gap:6px;margin-top:6px}
.react{background:rgba(255,255,255,0.06);padding:3px 8px;border-radius:12px;font-size:12px;cursor:pointer}

.input{padding:10px;display:flex;gap:8px;border-top:1px solid var(--border)}
.input input{flex:1;background:rgba(255,255,255,0.05);border:none;border-radius:12px;padding:10px;color:white}
.send{background:linear-gradient(135deg,var(--blue),var(--violet));border:none;padding:10px;border-radius:10px}

/* EMOJI GRID */
.emoji-box{
position:absolute;
bottom:60px;
left:10px;
width:260px;
height:200px;
overflow:auto;
background:#111;
border:1px solid var(--border);
border-radius:10px;
padding:8px;
display:none;
}
.emoji-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
}
.emoji-grid span{
cursor:pointer;
padding:6px;
border-radius:6px;
text-align:center;
}
.emoji-grid span:hover{
background:rgba(255,255,255,0.1);
}

</style>
</head>

<body>
<div class="app">

<div class="top">ClassChat V7</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msg" placeholder="Message...">
<input type="file" id="imgInput" hidden>
<button onclick="imgInput.click()">📎</button>
<button onclick="toggleEmoji()">😀</button>
<button class="send" onclick="sendMsg()">➤</button>
</div>

<div id="emojiBox" class="emoji-box">
<div class="emoji-grid" id="emojiGrid"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={databaseURL:"https://class-chat-d8a0c-default-rtdb.firebaseio.com"};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let username=localStorage.getItem("username")||"Taransh";
let admin="Taransh";
let currentRoom="chat";

function renderMsg(id,data){
let d=document.createElement("div");d.className="msg";
let ownerTag=data.user===admin?'<span class="owner">OWNER</span>':'';
let reactionsHTML="";
if(data.reactions){Object.entries(data.reactions).forEach(([e,c])=>{reactionsHTML+=`<div class='react' onclick="reactMsg('${id}','${e}')">${e} ${c}</div>`})}

d.innerHTML=`
<div class="avatar">${data.user[0]}</div>
<div>
<div class="name">${data.user} ${ownerTag}</div>
<div class="text">${data.text||""}</div>
${data.img?`<img src="${data.img}">`:""}
<div class="reactions">${reactionsHTML}</div>
</div>
<div class="actions">
<button onclick="editMsg('${id}','${data.text}')">✏</button>
<button onclick="deleteMsg('${id}')">🗑</button>
<button onclick="reactMsg('${id}','🔥')">🔥</button>
</div>`;
messages.appendChild(d);
}

function loadMessages(){
messages.innerHTML="";
onValue(ref(db,`rooms/${currentRoom}`),(snap)=>{
messages.innerHTML="";
let data=snap.val();
if(data) Object.entries(data).forEach(([id,msg])=>renderMsg(id,msg));
});}

window.sendMsg=()=>{
let text=msg.value;
let file=imgInput.files[0];
if(!text&&!file)return;
if(file){
let reader=new FileReader();
reader.onload=e=>push(ref(db,`rooms/${currentRoom}`),{user:username,text,img:e.target.result});
reader.readAsDataURL(file);
}else push(ref(db,`rooms/${currentRoom}`),{user:username,text});
msg.value="";imgInput.value="";
};

window.editMsg=(id,old)=>{let n=prompt("Edit:",old);if(n)update(ref(db,`rooms/${currentRoom}/${id}`),{text:n});};
window.deleteMsg=(id)=>remove(ref(db,`rooms/${currentRoom}/${id}`));
window.reactMsg=(id,e)=>runTransaction(ref(db,`rooms/${currentRoom}/${id}/reactions/${e}`),c=>(c||0)+1);

// FULL EMOJI GRID
const emojis="😀😁😂🤣😃😄😅😆😉😊😋😎😍😘😗😙😚🙂🤗🤩🤔🤨😐😑😶🙄😏😣😥😮🤐😯😪😫🥱😴😌😛😜😝🤤😒😓😔😕🙃🤑😲☹😖😞😟😤😢😭😦😧😨😩🤯😬😰😱🥵🥶😳🤪😵".split("");

emojis.forEach(e=>{
let span=document.createElement("span");
span.innerText=e;
span.onclick=()=>msg.value+=e;
emojiGrid.appendChild(span);
});

window.toggleEmoji=()=>{
emojiBox.style.display=emojiBox.style.display==='block'?'none':'block';
};

loadMessages();
</script>
</body>
</html>
